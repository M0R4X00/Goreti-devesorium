<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Goreti Devesorium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#111;
    color:white;
}

/* CONTENEDOR */
.login-box{
    background:#1c1c1c;
    padding:40px;
    border-radius:8px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* TITULO */
h2{
    font-family:'Playfair Display', serif;
    letter-spacing:2px;
    margin-bottom:25px;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111;
    border:1px solid #333;
    border-radius:5px;
    color:white;
}

input:focus{
    outline:none;
    border:1px solid #8b0000;
}

/* BOTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:white;
    color:black;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#8b0000;
    color:white;
}

/* MENSAJE */
#mensaje{
    margin-top:15px;
    color:#8b0000;
    font-weight:bold;
}
a{
    color:#aaa;
    text-decoration:none;
}

a:hover{
    color:#8b0000;
}
.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
}

.logo img{
    height:50px;
    object-fit:contain;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:black;
}
.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 80px);
}

</style>

</head>

<body>
    <header>
        <div class="logo">
            <img src="/images/icono.jpeg" alt="Logo Goreti Devesorium">
            <span>Goreti Devesorium</span>
        </div>
    
        <nav>
            <a href="/index.html">Habitaciones</a>
            <a href="/index.html">Servicios</a>
            <a href="/index.html">Galería</a>
            <a href="/index.html">Reservar</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-box">
    
            <h2>Ingreso al sistema</h2>
        
            <form id="loginForm">
        
                <input type="email" id="correo" placeholder="Correo">
        
                <input type="text" id="documento" placeholder="Documento (opcional)">
        
                <input type="password" id="password" placeholder="Contraseña">
        
                <button type="submit">Ingresar</button>
        
                <p>¿No tienes cuenta? <a href="/pages/register_reserva.html">Regístrate</a></p>
        
            </form>
    
         <p id="mensaje"></p>  
        </div>
    </div>

<script>

async function obtenerCSRF() {
    const res = await fetch('/csrf-token', {
        credentials: 'include'
    });

    const data = await res.json();
    return data.csrfToken;
}

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const csrfToken = await obtenerCSRF();

    const correo = document.getElementById("correo").value;
    const documento = document.getElementById("documento").value;
    const contraseña = document.getElementById("password").value;

    const res = await fetch('/login',{

        method:'POST',

        headers:{
            'Content-Type':'application/json',
            'CSRF-Token': csrfToken
        },

        credentials:'include',

        body: JSON.stringify({
            correo: correo,
            NO_Documento: documento,
            contraseña: contraseña
        })

    });

    const data = await res.json();

    document.getElementById("mensaje").innerText = data.message_ingreso;

    if(data.message_ingreso === "Correcto"){
        localStorage.setItem("usuario", JSON.stringify(data.usuario));
        alert("Bienvenido " + data.usuario.nombre);
        window.location.href = "/pages/panel_usuario.html";
    }

});

</script>

</body>
</html>
