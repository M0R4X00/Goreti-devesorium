<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - Goreti Devesorium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#111;
    color:white;
}

.register-box{
    background:#1c1c1c;
    padding:40px;
    border-radius:8px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
    font-family:'Playfair Display', serif;
    letter-spacing:2px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111;
    border:1px solid #333;
    border-radius:5px;
    color:white;
}

input:focus{
    outline:none;
    border:1px solid #8b0000;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:white;
    color:black;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#8b0000;
    color:white;
}

#mensaje{
    margin-top:15px;
    color:#8b0000;
    font-weight:bold;
}

a{
    color:#aaa;
    text-decoration:none;
}

a:hover{
    color:#8b0000;
}

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 80px);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
}

.logo img{
    height:50px;
    object-fit:contain;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:black;
}
.register-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 80px);
}

</style>

</head>

<body>

    <header>
        <div class="logo">
            <img src="/images/icono.jpeg" alt="Logo Goreti Devesorium">
            <span>Goreti Devesorium</span>
        </div>
    
        <nav>
            <a href="/index.html">Habitaciones</a>
            <a href="/index.html">Servicios</a>
            <a href="/index.html">Galería</a>
            <a href="/index.html">Reservar</a>
        </nav>
    </header>
<div class="register-container">
    <div class="register-box">
    
        <h2>Registro</h2>
    
        <form id="registerForm">
    
            <input type="text" id="nombre" placeholder="Nombre completo" required>
    
            <input type="email" id="correo" placeholder="Correo" required>
    
            <input type="text" id="documento" placeholder="Documento" required>
    
            <input type="password" id="password" placeholder="Contraseña" required>
    
            <button type="submit">Registrar</button>
    
        </form>
    
        <p id="mensaje"></p>
    
        <p>¿Ya tienes cuenta? <a href="/pages/login_reserva.html">Inicia sesión</a></p>
    
    </div>
</div>

<script>

async function obtenerCSRF() {
    const res = await fetch('/csrf-token', {
        credentials: 'include'
    });

    const data = await res.json();
    return data.csrfToken;
}

document.getElementById("registerForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const csrfToken = await obtenerCSRF();

    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const documento = document.getElementById("documento").value;
    const contraseña = document.getElementById("password").value;

    const res = await fetch('/register',{

        method:'POST',

        headers:{
            'Content-Type':'application/json',
            'CSRF-Token': csrfToken
        },

        credentials:'include',

        body: JSON.stringify({
            nombre: nombre,
            correo: correo,
            NO_Documento: documento,
            contraseña: contraseña
        })

    });

    const data = await res.json();

    document.getElementById("mensaje").innerText = data.message_registro;

    if(data.message_registro === "Se ha registrado correctamente"){
        alert("Usuario registrado correctamente");
    }

});

</script>

</body>
</html>
